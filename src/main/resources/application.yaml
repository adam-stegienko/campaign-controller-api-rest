spring:
  application:
    name: campaign_controller_api_rest
  jpa:
    hibernate:
      ddl-auto: update
  liquibase:
    change-log: classpath:db/changelog/changelog.sql

server:
  port: 8000

# Google Ads API configuration (provide real values via environment variables in production)
api:
  googleads:
    enabled: ${API_GOOGLEADS_ENABLED:false}
    developerToken: ${API_GOOGLEADS_DEVELOPERTOKEN:dummy-token}
    serviceAccountSecretsPath: ${API_GOOGLEADS_SERVICEACCOUNTSECRETSPATH:/dev/null}
    loginCustomerId: ${API_GOOGLEADS_LOGINCUSTOMERID:0000000000}

# Actuator configuration for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  health:
    defaults:
      enabled: true
    db:
      enabled: true
  tracing:
    enabled: ${OTEL_TRACING_OTLP_ENABLED:false}
    sampling:
      probability: 1.0
    exporter:
      otlp:
        enabled: ${OTEL_TRACING_OTLP_ENABLED:false}
        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  metrics:
    export:
      otlp:
        enabled: ${OTEL_METRICS_OTLP_ENABLED:false}
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
